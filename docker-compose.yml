version: '3'
services:
  maplestory:
    build: .
    ports:
      # Login server
      - "8484:8484"
      # Channels.
      # Format: WWCC, where WW is 75 plus the world number and CC is 75 plus the channel number (both zero indexed).
      # In this case, world 1 channels 1-3.
      - "7575-7577:7575-7577"
    volumes:
      # Config changes can be reloaded without rebuilding the image.
      # Still requires a redeployment as they're sourced on startup.
      - /home/chao/game_server/maple_cosmic/config.yaml:/opt/server/config.yaml
      - /home/chao/game_server/maple_cosmic/scripts:/opt/server/scripts
      - /home/chao/game_server/maple_cosmic/wz:/opt/server/wz
    environment:
      DB_HOST: mariadb ## Remember if this is present it will OVERRIDE the host in the config.yaml, if you put here anything other than db, you'll need to change the config.yaml jdbc string to port 3307, and not port 3306   
      DB_PORT: 3306
      DB_NAME: maple_cosmic
      DB_USER: maple
      DB_PASSWORD: WRDL.Lq-.TvA)FIB
    networks:
      - backend

networks:
  backend:
    external: true
    name: backend-net
